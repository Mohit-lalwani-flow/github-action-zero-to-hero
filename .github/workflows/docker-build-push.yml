name: Docker Build & Push

on:
    workflow_dispatch: 

jobs:
    build-and-push:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout Code
              uses: actions/checkout@v4

            - name: Login to Docker Hub
              uses: docker/login-action@v3
              with: 
                username: ${{ secrets.DOCKERHUB_USER }}
                password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Build & Push to Docker Hub
              uses: docker/build-push-action@v6
              with:
                context: . 
                push: true
                tags: |
                    ${{ secrets.DOCKERHUB_USER }}/github-actions-app:${{ github.ref_name }}
                    ${{ secrets.DOCKERHUB_USER }}/github-actions-app:latest
                    ${{ secrets.DOCKERHUB_USER }}/github-actions-app:${{ github.sha }}
